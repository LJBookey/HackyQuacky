<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="style.css" />
    </head>
    <title>Hacky Quacky</title>

    <body>
        <header><h2>Hacky Quacky</h2></header>


        <div class="flex-container">
                <!-- The code for the form -->
        <!-- <div class="duckNoise"> -->
            <div class="duckNoise">
            <button type="button" id="recordingBttn">
                <img id="recordingBttnImg" src="stopRecording.png" alt="recordingButton">
            </button>
                        
        <!-- </div> -->
            <div class="duckGif">
                <div class="childEl"><img id="duckImg" src="englishDuck.gif" alt="a pixel duck" style = "width:100%; height:100%"></div>
                <div class="childEl2">
                    <select id="choices">
                        <option value="english">English</option>
                        <option value="scottish">Scottish</option>
                        <option value="french">French</option>
                        <option value="german">German</option>
                        <option value="spanish">Spanish</option>
                    </select>
                </div>
                

            </div>
            <div class="duckTranslation">
                <h3>Translated duck: </h3>
                <p> <span class="translate"></span></p>
            </div>
        </div>


        <div class="footer">
            <img id="duckFriend" src="ducklove.gif" alt="a pixel duck">
        </div>
    </body>
    <script src="audiorec.js"></script>
</html>
